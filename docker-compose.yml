services:
  postgres:
    image: postgres:16-alpine
    container_name: fun_admin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fun_admin
      POSTGRES_PASSWORD: fun_admin
      POSTGRES_DB: fun_admin
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fun_admin -d fun_admin"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - fun_admin_postgres_data:/var/lib/postgresql/data

volumes:
  fun_admin_postgres_data:
